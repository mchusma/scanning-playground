<!DOCTYPE html>
<html>
<head>
<title>Eval Floor Plan Viewer</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: #eee; margin: 0; padding: 20px; }
  h1 { font-size: 20px; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(600px, 1fr)); gap: 20px; }
  .card { background: #2a2a2a; border-radius: 8px; padding: 16px; }
  .card h2 { font-size: 14px; margin: 0 0 12px; color: #aaa; }
  .card img { width: 100%; border-radius: 4px; background: white; }
  .scores { font-size: 12px; color: #888; margin-top: 8px; }
  .score-num { font-weight: 700; font-size: 18px; margin-right: 8px; }
  .score-high { color: #4caf50; }
  .score-mid { color: #ff9800; }
  .score-low { color: #f44336; }
  .inventory { margin-top: 12px; font-size: 11px; color: #999; }
  .inv-cat { margin: 4px 0; }
  .inv-cat-name { color: #aaa; font-weight: 600; }
  .inv-items { color: #777; }
  .tabs { display: flex; gap: 8px; margin-bottom: 8px; }
  .tab { padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; background: #333; color: #aaa; border: none; }
  .tab.active { background: #444; color: #eee; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .summary-bar { display: flex; gap: 20px; margin-bottom: 20px; padding: 16px; background: #2a2a2a; border-radius: 8px; }
  .summary-stat { text-align: center; }
  .summary-stat .val { font-size: 28px; font-weight: 700; }
  .summary-stat .label { font-size: 11px; color: #888; }
</style>
</head>
<body>
<h1>Eval Floor Plans</h1>
<div class="summary-bar" id="summary"></div>
<div class="grid" id="grid"></div>
<script>
const tests = ['01-studio', '02-1bed', '03-2bed-penthouse', '04-3bed', '05-luxury'];
const grid = document.getElementById('grid');

for (const name of tests) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <h2>${name}</h2>
    <div class="tabs">
      <button class="tab active" data-tab="floor-${name}">Floor Plan</button>
      <button class="tab" data-tab="inv-${name}">Asset Inventory</button>
    </div>
    <div class="tab-content active" id="floor-${name}">
      <img src="/test-output/eval/${name}-floorplan.svg" alt="${name}" />
    </div>
    <div class="tab-content" id="inv-${name}">
      <div class="inventory" id="inventory-${name}">Loading inventory...</div>
    </div>
    <div class="scores" id="scores-${name}">Loading scores...</div>
  `;
  grid.appendChild(card);

  // Load inventory
  fetch('/test-output/eval/' + name + '-inventory.json')
    .then(r => r.json())
    .then(inv => {
      const el = document.getElementById('inventory-' + name);
      let html = '<div style="margin-bottom:8px"><strong>' + inv.summary.totalRooms + ' rooms</strong> | <strong>' + inv.summary.totalFeatures + ' features</strong> | <strong>' + inv.summary.totalConnections + ' connections</strong></div>';
      for (const [cat, items] of Object.entries(inv.assetsByCategory || {})) {
        html += '<div class="inv-cat"><span class="inv-cat-name">' + cat + ' (' + items.length + ')</span>: <span class="inv-items">' + items.map(i => i.name + ' <em>(' + i.room + ')</em>').join(', ') + '</span></div>';
      }
      el.innerHTML = html;
    })
    .catch(() => { document.getElementById('inventory-' + name).textContent = 'No inventory available'; });
}

// Tab switching
document.addEventListener('click', e => {
  if (!e.target.classList.contains('tab')) return;
  const tabId = e.target.dataset.tab;
  const card = e.target.closest('.card');
  card.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  card.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById(tabId).classList.add('active');
});

// Load scores
fetch('/test-output/eval/eval-summary.json')
  .then(r => r.json())
  .then(data => {
    for (const t of data.tests || []) {
      const el = document.getElementById('scores-' + t.name);
      const cls = t.overall >= 80 ? 'score-high' : t.overall >= 60 ? 'score-mid' : 'score-low';
      if (el) el.innerHTML = '<span class="score-num ' + cls + '">' + t.overall + '/100</span> Rooms: ' + t.scores.rooms.detected + '/' + t.scores.rooms.expected + ' | Connections: ' + t.scores.connections.found + '/' + t.scores.connections.expected + ' | Features: ' + t.scores.features.found + '/' + t.scores.features.expected;
    }
    // Summary bar
    const avg = data.average;
    const cls = avg >= 80 ? 'score-high' : avg >= 60 ? 'score-mid' : 'score-low';
    document.getElementById('summary').innerHTML = `
      <div class="summary-stat"><div class="val ${cls}">${avg}</div><div class="label">Average Score</div></div>
      <div class="summary-stat"><div class="val">${data.tests.length}</div><div class="label">Videos Tested</div></div>
      <div class="summary-stat"><div class="val">${Math.min(...data.tests.map(t=>t.overall))}</div><div class="label">Lowest</div></div>
      <div class="summary-stat"><div class="val">${Math.max(...data.tests.map(t=>t.overall))}</div><div class="label">Highest</div></div>
    `;
  })
  .catch(() => {});
</script>
</body>
</html>
